<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=DM+Mono:wght@400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <title>Il Podio</title>
    <style>
      body { margin: 0; background: #0A0906; }
      #app-loader {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #0A0906; z-index: 9999;
        transition: opacity 0.4s;
      }
      #app-loader.fade-out { opacity: 0; pointer-events: none; }
      #app-loader h1 {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 300; font-size: 3rem;
        color: #EDE8D0; letter-spacing: 0.1em;
        margin: 0;
      }
      #app-loader .subtitle {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 300; font-size: 1rem;
        color: #8A7E6B; margin-top: 0.5rem;
      }
      #app-loader .loader-btn {
        margin-top: 2rem; padding: 0.8rem 2.5rem;
        font-family: 'DM Mono', monospace; font-size: 0.9rem;
        color: #0A0906; background: #C9972A;
        border: none; cursor: pointer; letter-spacing: 0.05em;
        display: none;
      }
      #app-loader .loader-btn:active { opacity: 0.85; }
      #app-loader .diag {
        font-family: monospace; font-size: 0.65rem;
        color: #ff6b6b; margin-top: 1.5rem;
        max-width: 90%; text-align: left;
        white-space: pre-wrap; word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <h1>Il Podio</h1>
      <p class="subtitle">Beethoven — Sinfonía No. 7, II</p>
      <button class="loader-btn" onclick="location.reload()">Reintentar</button>
    </div>

    <div id="root"></div>

    <!-- Catch module-level errors that happen BEFORE React mounts -->
    <script>
      window.addEventListener('error', function(e) {
        var loader = document.getElementById('app-loader');
        if (!loader) return;
        var diag = loader.querySelector('.diag');
        if (!diag) { diag = document.createElement('pre'); diag.className = 'diag'; loader.appendChild(diag); }
        diag.textContent += e.message + '\n';
        var btn = loader.querySelector('.loader-btn');
        if (btn) btn.style.display = 'block';
      });
      window.addEventListener('unhandledrejection', function(e) {
        var loader = document.getElementById('app-loader');
        if (!loader) return;
        var diag = loader.querySelector('.diag');
        if (!diag) { diag = document.createElement('pre'); diag.className = 'diag'; loader.appendChild(diag); }
        diag.textContent += (e.reason ? (e.reason.message || String(e.reason)) : 'unknown') + '\n';
        var btn = loader.querySelector('.loader-btn');
        if (btn) btn.style.display = 'block';
      });
      setTimeout(function() {
        var loader = document.getElementById('app-loader');
        if (loader && !loader.classList.contains('fade-out')) {
          var btn = loader.querySelector('.loader-btn');
          if (btn) btn.style.display = 'block';
        }
      }, 8000);
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
